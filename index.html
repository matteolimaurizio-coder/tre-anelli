<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tre Anelli</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#f5f5f0;min-height:100vh;padding:12px;}
/* LOBBY */
#lobby{text-align:center;padding:30px 20px;}
#lobby h1{font-size:26px;font-weight:600;margin-bottom:6px;color:#222;}
#lobby>p{font-size:13px;color:#888;margin-bottom:24px;}
.section-title{font-size:15px;font-weight:500;color:#444;margin:18px 0 10px;}
.btns{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
.btns button{font-size:13px;padding:10px 18px;cursor:pointer;border-radius:10px;border:1px solid #ccc;background:#fff;line-height:1.8;}
.btns button:hover{background:#f0f0f0;}
#join-box{display:none;margin-top:12px;}
#join-box input{font-size:18px;padding:7px 12px;border-radius:8px;border:1px solid #ccc;width:110px;text-align:center;text-transform:uppercase;letter-spacing:4px;margin-right:8px;}
#join-box button{font-size:13px;padding:8px 16px;cursor:pointer;border-radius:8px;border:1px solid #ccc;background:#fff;}
#waiting{display:none;text-align:center;padding:16px;}
#waiting .code{font-size:36px;font-weight:700;letter-spacing:8px;color:#c04828;margin:12px 0;}
#lobby-status{font-size:13px;color:#e85d24;margin-top:8px;min-height:18px;}
.divider{border:none;border-top:1px solid #e0e0e0;margin:20px auto;width:80%;}
/* GAME */
#game{display:none;}
#sb{font-size:13px;color:#666;text-align:center;padding:7px 12px;border-radius:9px;background:#ececec;margin-bottom:8px;}
#tl{font-size:16px;font-weight:600;color:#222;margin-bottom:2px;}
#al{font-size:12px;color:#888;min-height:16px;}
#mode-label{font-size:11px;color:#aaa;text-align:center;margin-bottom:4px;}
#bw{display:flex;justify-content:center;position:relative;}
#wo{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.55);align-items:center;justify-content:center;border-radius:12px;flex-direction:column;z-index:10;}
#wbox{background:#fff;border-radius:13px;padding:24px 32px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.18);}
#wbox h2{font-size:20px;font-weight:600;margin-bottom:6px;}
#wbox p{font-size:13px;color:#888;margin-bottom:16px;}
#wbox button{font-size:13px;padding:7px 16px;cursor:pointer;border-radius:8px;border:1px solid #ccc;background:#fff;margin:4px;}
#controls{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:8px;}
#controls button{font-size:12px;padding:5px 14px;cursor:pointer;border-radius:8px;border:1px solid #ccc;background:#fff;}
#rot-controls{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-top:6px;}
#rot-controls button{font-size:12px;padding:5px 12px;cursor:pointer;border-radius:8px;border:1px solid #ccc;background:#fff;transition:background 0.15s;}
#rot-controls button:hover:not(.off){background:#fff7e0;border-color:#f0a500;}
#rot-controls button.previewing{background:#fff7e0;border-color:#f0a500;}
#rot-controls button.off{opacity:0.32;cursor:default;}
#info-bar{display:flex;justify-content:center;gap:20px;margin-top:7px;font-size:12px;color:#666;}
#rot-hint{margin-top:4px;font-size:11px;color:#f0a500;text-align:center;min-height:14px;font-style:italic;}
#lg{margin-top:4px;font-size:11px;color:#aaa;text-align:center;min-height:15px;}
#nav{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:8px;}
#nav button{font-size:16px;padding:3px 12px;cursor:pointer;border-radius:7px;border:1px solid #ccc;background:#fff;}
#nav button:disabled{opacity:0.28;cursor:default;}
#nav span{font-size:11px;color:#888;min-width:70px;text-align:center;}
#notation-wrap{margin-top:12px;border:0.5px solid #ddd;border-radius:9px;background:#fff;overflow:hidden;}
#notation-head{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#f5f5f0;border-bottom:0.5px solid #ddd;}
#notation-head span{font-size:12px;font-weight:600;color:#444;}
#notation-head button{font-size:11px;padding:3px 10px;cursor:pointer;border-radius:6px;border:1px solid #ccc;background:#fff;}
#notation-log{font-family:monospace;font-size:11px;color:#333;padding:8px 10px;max-height:160px;overflow-y:auto;line-height:1.8;white-space:pre-wrap;min-height:32px;}
#notation-log .p1{color:#c04828;}
#notation-log .p2{color:#1d6fa5;}
#notation-log .cur{background:#fff7e0;border-radius:3px;padding:0 2px;}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <h1>Tre Anelli</h1>
  <p>Anello interno fisso — pezzi catturati eliminati</p>

  <div class="section-title">🌐 Gioca online con un amico</div>
  <div class="btns">
    <button onclick="createGame()">🔴 Crea partita<br><small style="font-size:11px;color:#888;">ottieni un codice</small></button>
    <button onclick="showJoin()">🔵 Unisciti<br><small style="font-size:11px;color:#888;">inserisci il codice</small></button>
  </div>
  <div id="join-box">
    <input id="join-code" maxlength="4" placeholder="XXXX" oninput="this.value=this.value.toUpperCase()">
    <button onclick="joinGame()">Entra</button>
  </div>
  <div id="waiting">
    <p>Condividi questo codice con il tuo avversario:</p>
    <div class="code" id="game-code"></div>
    <p style="color:#888;font-size:12px;">In attesa che l'avversario si connetta…</p>
  </div>
  <div id="lobby-status"></div>

  <hr class="divider">

  <div class="section-title">👥 Gioca in locale</div>
  <div class="btns">
    <button onclick="startLocal('2p')">👥 Due giocatori<br><small style="font-size:11px;color:#888;">stesso schermo</small></button>
    <button onclick="startLocal('ai1')">🔴 vs IA<br><small style="font-size:11px;color:#888;">gioco come P1</small></button>
    <button onclick="startLocal('ai2')">🔵 vs IA<br><small style="font-size:11px;color:#888;">gioco come P2</small></button>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div id="mode-label"></div>
  <div id="sb">
    <div id="tl">Turno: P1 (rosso)</div>
    <div id="al">Seleziona una pedina.</div>
  </div>
  <div id="bw">
    <canvas id="cv" width="540" height="540" style="max-width:100%;display:block;border-radius:10px;background:#fff;"></canvas>
    <div id="wo">
      <div id="wbox">
        <h2 id="wt"></h2><p id="wr"></p>
        <button onclick="G.seeBoard()">Vedi posizione finale</button>
        <button onclick="G.restart()" id="btn-restart">Rivincita</button>
        <button onclick="goMenu()">Menu</button>
      </div>
    </div>
  </div>
  <div id="controls">
    <button onclick="G.restart()" id="btn-restart2">Ricomincia</button>
    <button onclick="goMenu()">Menu</button>
  </div>
  <div id="rot-controls">
    <button id="btn-M" onmouseenter="G.previewRot('M')" onmouseleave="G.clearPreview()" onclick="G.rot('M')">↺ Medio</button>
    <button id="btn-E" onmouseenter="G.previewRot('E')" onmouseleave="G.clearPreview()" onclick="G.rot('E')">↺ Esterno</button>
  </div>
  <div id="info-bar">
    <span>🔴 P1: <b id="c1">9</b></span>
    <span>🔵 P2: <b id="c2">9</b></span>
    <span id="rb">Prossima rot.: 1</span>
  </div>
  <div id="rot-hint"></div>
  <div id="lg"></div>
  <div id="nav">
    <button id="nf" onclick="G.navFirst()">⏮</button>
    <button id="np" onclick="G.navPrev()">◀</button>
    <span id="nl">0 / 0</span>
    <button id="nn" onclick="G.navNext()">▶</button>
    <button id="nl2" onclick="G.navLast()">⏭</button>
  </div>
  <div id="notation-wrap">
    <div id="notation-head">
      <span>📋 Notazione partita</span>
      <button onclick="G.copyNotation()">Copia</button>
    </div>
    <div id="notation-log"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, onValue, push as fbPush } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD0byKrvAG1AnQJyxhwab503Rp3OiUfgbw",
  authDomain: "tre-anelli.firebaseapp.com",
  databaseURL: "https://tre-anelli-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "tre-anelli",
  storageBucket: "tre-anelli.firebasestorage.app",
  messagingSenderId: "873864785531",
  appId: "1:873864785531:web:fe6b728fb97fe381b73cde"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let gameCode=null, movesRef=null, lastProcessedMove=-1;

function genCode(){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ';
  return Array.from({length:4},()=>c[Math.floor(Math.random()*c.length)]).join('');
}

window.createGame = async function(){
  const code=genCode(); gameCode=code;
  await set(ref(db,'games/'+code),{status:'waiting',created:Date.now(),moves:[]});
  document.getElementById('game-code').textContent=code;
  document.getElementById('waiting').style.display='block';
  document.getElementById('lobby-status').textContent='';
  onValue(ref(db,'games/'+code+'/status'),snap=>{
    if(snap.val()==='playing') startOnline(code,1);
  });
};

window.showJoin = function(){
  document.getElementById('join-box').style.display='block';
  document.getElementById('join-code').focus();
};

window.joinGame = async function(){
  const code=document.getElementById('join-code').value.trim().toUpperCase();
  if(code.length!==4){document.getElementById('lobby-status').textContent='Inserisci 4 lettere.';return;}
  const snap=await get(ref(db,'games/'+code));
  if(!snap.exists()){document.getElementById('lobby-status').textContent='Codice non trovato.';return;}
  if(snap.val().status!=='waiting'){document.getElementById('lobby-status').textContent='Partita non disponibile.';return;}
  gameCode=code;
  await set(ref(db,'games/'+code+'/status'),'playing');
  startOnline(code,2);
};

function startOnline(code,player){
  document.getElementById('lobby').style.display='none';
  document.getElementById('game').style.display='block';
  document.getElementById('mode-label').textContent='🌐 Online — Partita: '+code+' — Sei P'+(player===1?'1 🔴':'2 🔵');
  document.getElementById('btn-restart').style.display='none';
  document.getElementById('btn-restart2').style.display='none';
  lastProcessedMove=-1;
  movesRef=ref(db,'games/'+code+'/moves');
  G.init('online',player);
  onValue(movesRef,snap=>{
    const moves=snap.val();if(!moves)return;
    const arr=Array.isArray(moves)?moves:Object.values(moves);
    arr.forEach((mv,idx)=>{
      if(idx>lastProcessedMove){
        lastProcessedMove=idx;
        if(mv.player!==player) G.applyRemote(mv);
      }
    });
  });
}

window.sendMove = function(mv){
  if(movesRef) fbPush(movesRef,mv);
};

window.startLocal = function(mode){
  document.getElementById('lobby').style.display='none';
  document.getElementById('game').style.display='block';
  const labels={'2p':'👥 Due giocatori','ai1':'🤖 vs IA (sei P1 🔴)','ai2':'🤖 vs IA (sei P2 🔵)'};
  document.getElementById('mode-label').textContent=labels[mode];
  document.getElementById('btn-restart').style.display='';
  document.getElementById('btn-restart2').style.display='';
  G.init(mode,0);
};

window.goMenu = function(){
  document.getElementById('game').style.display='none';
  document.getElementById('lobby').style.display='block';
  document.getElementById('waiting').style.display='none';
  document.getElementById('join-box').style.display='none';
  document.getElementById('lobby-status').textContent='';
  movesRef=null;
};

// ── GAME ENGINE ──
window.G = (function(){
  const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  const W=540,H=540,CX=270,CY=270,RE=210,RM=130,RI=58;

  function cA(ring,n){const step=ring==='E'?20:ring==='M'?30:60;let d=180-(n-1)*step;while(d<0)d+=360;return d*Math.PI/180;}
  function nP(id){if(id==='C')return[CX,CY];const r=id[0],n=parseInt(id.slice(1)),rr=r==='E'?RE:r==='M'?RM:RI;return[CX+rr*Math.cos(cA(r,n)),CY+rr*Math.sin(cA(r,n))];}
  function aD(id){const r=id[0],n=parseInt(id.slice(1)),step=r==='E'?20:r==='M'?30:60;let d=180-(n-1)*step;while(d<0)d+=360;return d;}
  const S20=Math.sin(20*Math.PI/180),RY=[CY+RE*S20,CY,CY-RE*S20];
  const RL=['E2','M2','I2','I3','M6','E9'],RE_=['E1','M1','I1','C','I4','M7','E10'],RH=['E18','M12','I6','I5','M8','E11'];
  function pos(id){const[nx,ny]=nP(id);if(RL.includes(id))return[nx,RY[0]];if(RE_.includes(id))return[nx,RY[1]];if(RH.includes(id))return[nx,RY[2]];return[nx,ny];}

  const ADJ={};
  function ae(a,b){if(!ADJ[a])ADJ[a]=[];if(!ADJ[b])ADJ[b]=[];if(!ADJ[a].includes(b))ADJ[a].push(b);if(!ADJ[b].includes(a))ADJ[b].push(a);}
  for(let i=1;i<=18;i++)ae('E'+i,'E'+(i===18?1:i+1));
  for(let i=1;i<=12;i++)ae('M'+i,'M'+(i===12?1:i+1));
  for(let i=1;i<=6;i++)ae('I'+i,'I'+(i===6?1:i+1));
  ae('C','I1');ae('C','I4');
  ae('E1','M1');ae('M1','I1');ae('I1','C');ae('C','I4');ae('I4','M7');ae('M7','E10');
  ae('E2','M2');ae('M2','I2');ae('I2','I3');ae('I3','M6');ae('M6','E9');
  ae('E18','M12');ae('M12','I6');ae('I6','I5');ae('I5','M8');ae('M8','E11');

  const WIN=['I1','I3','I5'];
  const P1S=['E3','E4','E5','E6','E7','E8','M3','M4','M5'];
  const P2S=['E12','E13','E14','E15','E16','E17','M9','M10','M11'];
  const ALL=[...Array.from({length:18},(_,i)=>'E'+(i+1)),...Array.from({length:12},(_,i)=>'M'+(i+1)),...Array.from({length:6},(_,i)=>'I'+(i+1)),'C'];

  let special={};
  const ROWS=[['E18','M12','I6','I5','M8','E11'],['E1','M1','I1','C','I4','M7','E10'],['E2','M2','I2','I3','M6','E9']];
  function rowOf(id){return ROWS.findIndex(r=>r.includes(id));}
  function rowN(id){const ri=rowOf(id);return ri===-1?[]:ROWS[ri];}
  function spMoves(b,from,pl){
    const en=pl===1?2:1,row=rowN(from);if(!row.length)return{moves:[],caps:[]};
    const idx=row.indexOf(from),moves=[],caps=[];
    for(const dir of[-1,1]){let i=idx+dir;while(i>=0&&i<row.length){const cell=row[i];if(b[cell]===0){moves.push(cell);}else if(b[cell]===en){const j=i+dir;if(j>=0&&j<row.length&&b[row[j]]===0)caps.push({mid:cell,to:row[j]});break;}else{break;}i+=dir;}}
    return{moves,caps};
  }

  // Game state
  let board,cur,sel,mode,rotN,must,over,anim,prvRing,lastMove,hist,navI;
  let notMoves=[],pendingHalf=null,pendingCap=null;
  let gameMode,myPl; // gameMode: 'online','2p','ai1','ai2'

  // Notation
  function notStr(lm){
    if(!lm)return'?';
    if(lm.type==='move'){
      if(lm.steps&&lm.steps.length){let s=lm.from;lm.steps.forEach(st=>s+='×'+st.mid+'>'+st.to);return s;}
      return lm.from+'-'+lm.to;
    }
    if(lm.type==='rot')return'r'+lm.ring+(lm.steps>1?lm.steps:'');
    return'?';
  }
  function pushNotation(lm,player){
    const s=notStr(lm);
    if(player===1){pendingHalf=s;}
    else{notMoves.push({num:notMoves.length+1,p1:pendingHalf||'?',p2:s});pendingHalf=null;}
    renderNotation();
  }
  function renderNotation(){
    const el=document.getElementById('notation-log');let html='';
    notMoves.forEach((m,i)=>{const isCur=(i===notMoves.length-1);html+=`<span>${m.num}. </span><span class="p1${isCur?' cur':''}">${m.p1}</span>  <span class="p2${isCur?' cur':''}">${m.p2||'…'}</span>\n`;});
    if(pendingHalf){html+=`<span>${notMoves.length+1}. </span><span class="p1 cur">${pendingHalf}</span>  …\n`;}
    el.innerHTML=html;el.scrollTop=el.scrollHeight;
  }
  function copyNotation(){
    const date=new Date().toLocaleDateString('it-IT');
    const modeStr={'online':'Online','2p':'P1: umano  P2: umano','ai1':'P1: umano  P2: IA','ai2':'P1: IA  P2: umano'}[gameMode]||'';
    let txt=`[${modeStr}]\n[${date}]\n\n`;
    notMoves.forEach(m=>{txt+=m.num+'. '+m.p1+'  '+(m.p2||'…')+'\n';});
    if(pendingHalf)txt+=(notMoves.length+1)+'. '+pendingHalf+'  …\n';
    navigator.clipboard.writeText(txt).then(()=>{const btn=document.querySelector('#notation-head button');const orig=btn.textContent;btn.textContent='✓ Copiato!';setTimeout(()=>btn.textContent=orig,1500);}).catch(()=>alert(txt));
  }

  function sn(){return{b:Object.assign({},board),cur,rotN,lm:lastMove?{...lastMove}:null,sp:Object.assign({},special)};}
  function pushH(lm,player){if(lm&&player)pushNotation(lm,player);hist.push(sn());navI=-1;nUpd();}
  function live(){return navI===-1;}

  function init(mode,player){
    gameMode=mode;myPl=player;
    board={};ALL.forEach(c=>board[c]=0);P1S.forEach(c=>board[c]=1);P2S.forEach(c=>board[c]=2);
    special={};['E5','E6','E14','E15'].forEach(c=>special[c]=true);
    cur=1;sel=null;mode='move';rotN=0;must=null;over=false;anim=false;prvRing=null;lastMove=null;
    hist=[];navI=-1;notMoves=[];pendingHalf=null;pendingCap=null;
    document.getElementById('wo').style.display='none';
    document.getElementById('rot-hint').textContent='';
    document.getElementById('notation-log').innerHTML='';
    hist.push(sn());nUpd();upd();draw();
    if(gameMode==='ai2') setTimeout(aiTurn,800);
  }

  function restart(){
    if(gameMode==='online')return;
    init(gameMode,myPl);
  }
  function seeBoard(){document.getElementById('wo').style.display='none';}

  // Navigation
  function navTo(i){const s=hist[i];if(!s)return;navI=i;board=Object.assign({},s.b);lastMove=s.lm?{...s.lm}:null;special=Object.assign({},s.sp||{});nUpd();upd();draw();}
  function navFirst(){navTo(0);}
  function navPrev(){const i=navI===-1?hist.length-2:navI-1;if(i>=0)navTo(i);}
  function navNext(){if(navI===-1)return;if(navI<hist.length-1)navTo(navI+1);else{navI=-1;const s=hist[hist.length-1];board=Object.assign({},s.b);lastMove=s.lm?{...s.lm}:null;special=Object.assign({},s.sp||{});nUpd();upd();draw();}}
  function navLast(){navI=-1;const s=hist[hist.length-1];board=Object.assign({},s.b);lastMove=s.lm?{...s.lm}:null;special=Object.assign({},s.sp||{});nUpd();upd();draw();}
  function nUpd(){
    const tot=hist.length-1,ci=navI===-1?tot:navI;
    document.getElementById('nl').textContent=ci+' / '+tot;
    document.getElementById('nf').disabled=ci===0;document.getElementById('np').disabled=ci===0;
    document.getElementById('nn').disabled=navI===-1;document.getElementById('nl2').disabled=navI===-1;
  }

  function rOf(id){if(id==='C')return'C';return id[0];}
  function rC(r){if(r==='M')return Array.from({length:12},(_,i)=>'M'+(i+1));return Array.from({length:18},(_,i)=>'E'+(i+1));}
  function cnt(b,pl){return ALL.filter(c=>b[c]===pl).length;}
  function hP(pl,r){return rC(r).some(c=>board[c]===pl);}
  function cF(b,from,pl){
    const en=pl===1?2:1,res=[];
    for(const mid of(ADJ[from]||[])){if(b[mid]!==en)continue;for(const to of(ADJ[mid]||[])){if(b[to]===0&&to!==from)res.push({mid,to});}}
    return res;
  }
  function hasNormalCap(pl){return ALL.some(c=>board[c]===pl&&cF(board,c,pl).length>0);}
  function hasSpecialCap(pl){return ALL.some(c=>board[c]===pl&&special[c]&&spMoves(board,c,pl).caps.length>0);}

  // Is current player human?
  function isHuman(){
    if(gameMode==='2p')return true;
    if(gameMode==='online')return cur===myPl;
    if(gameMode==='ai1')return cur===1;
    if(gameMode==='ai2')return cur===2;
    return true;
  }

  // ── AI ──
  function cS(b,from,pl){
    const seqs=[];
    function dfs(bd,at,steps,used){
      const js=cF(bd,at,pl).filter(j=>!used.includes(j.mid));
      if(!js.length){if(steps.length)seqs.push({origin:from,steps:[...steps],captured:[...used]});return;}
      for(const j of js){const nb=Object.assign({},bd);nb[at]=0;nb[j.mid]=0;nb[j.to]=pl;dfs(nb,j.to,[...steps,{from:at,mid:j.mid,to:j.to}],[...used,j.mid]);}
    }
    dfs(b,from,[],[]);return seqs;
  }
  function gM(b,rN,pl){
    const all=[];for(const c of ALL){if(b[c]!==pl)continue;all.push(...cS(b,c,pl));}
    if(all.length)return all.map(s=>({type:'capseq',seq:s}));
    const mv=[];
    for(const c of ALL){if(b[c]!==pl)continue;for(const to of(ADJ[c]||[])){if(b[to]===0)mv.push({type:'move',from:c,to});}}
    ['M','E'].forEach(r=>{if(rC(r).some(c=>b[c]===pl))mv.push({type:'rot',ring:r});});
    return mv;
  }
  function aM(b,rN,m,pl){
    const nb=Object.assign({},b);let nrN=rN;
    if(m.type==='move'){nb[m.to]=pl;nb[m.from]=0;}
    else if(m.type==='capseq'){nb[m.seq.origin]=0;for(const s of m.seq.steps){nb[s.mid]=0;nb[s.to]=pl;}}
    else if(m.type==='rot'){const st=(rN%3)+1;nrN=rN+1;const cells=rC(m.ring),n=cells.length,sp={};cells.forEach(c=>sp[c]=nb[c]);for(let i=0;i<n;i++)nb[cells[i]]=sp[cells[(i-st+n)%n]];}
    return{board:nb,rotN:nrN};
  }
  function term(b,pl){
    const en=pl===1?2:1;
    if(WIN.every(c=>b[c]===pl))return 100000;if(WIN.every(c=>b[c]===en))return -100000;
    if(ALL.every(c=>b[c]!==pl))return -100000;if(ALL.every(c=>b[c]!==en))return 100000;return null;
  }
  function eval_(b,pl){
    const t=term(b,pl);if(t!==null)return t;
    const en=pl===1?2:1;let sc=0;
    sc+=(cnt(b,pl)-cnt(b,en))*40;
    const mW=WIN.filter(c=>b[c]===pl).length,eW=WIN.filter(c=>b[c]===en).length;
    sc+=mW*300+mW*mW*300-eW*300-eW*eW*300;
    WIN.forEach(w=>{if(b[w]===0)for(const n of(ADJ[w]||[])){if(b[n]===pl)sc+=60;else if(b[n]===en)sc-=60;}});
    for(let i=1;i<=6;i++){const c='I'+i;if(b[c]===pl)sc+=50;else if(b[c]===en)sc-=50;}
    for(let i=1;i<=12;i++){const c='M'+i;if(b[c]===pl)sc+=15;else if(b[c]===en)sc-=15;}
    for(const c of ALL){if(b[c]!==pl)continue;if(cF(b,c,en).length>0)sc-=35;if(cF(b,c,pl).length>0)sc+=22;}
    return sc;
  }
  function mm(b,rN,d,al,be,mx,ap){
    const t=term(b,ap);if(t!==null)return t+(mx?d*8:-d*8);if(d===0)return eval_(b,ap);
    const pl=mx?ap:(ap===1?2:1),mv=gM(b,rN,pl);if(!mv.length)return eval_(b,ap);
    mv.sort((a,b)=>a.type==='capseq'?-1:b.type==='capseq'?1:0);
    if(mx){let best=-Infinity;for(const m of mv){const s=aM(b,rN,m,pl);best=Math.max(best,mm(s.board,s.rotN,d-1,al,be,false,ap));al=Math.max(al,best);if(be<=al)break;}return best;}
    else{let best=Infinity;for(const m of mv){const s=aM(b,rN,m,pl);best=Math.min(best,mm(s.board,s.rotN,d-1,al,be,true,ap));be=Math.min(be,best);if(be<=al)break;}return best;}
  }
  function aiTurn(){
    if(over||isHuman())return;
    const ap=cur,mv=gM(board,rotN,ap);
    if(!mv.length){endT();return;}
    mv.sort((a,b)=>a.type==='capseq'?-1:b.type==='capseq'?1:0);
    let best=-Infinity,bm=null;
    for(const m of mv){const s=aM(board,rotN,m,ap);const v=mm(s.board,s.rotN,4,-Infinity,Infinity,false,ap)+(Math.random()*0.3);if(v>best){best=v;bm=m;}}
    const m=bm,pl=ap;
    if(m.type==='move'){
      lastMove={type:'move',from:m.from,to:m.to};
      board[m.to]=pl;board[m.from]=0;
      log('IA: '+m.from+'→'+m.to+'.');pushH(lastMove,pl);chkW();if(!over)endT();
    } else if(m.type==='capseq'){
      const steps=m.seq.steps;
      lastMove={type:'move',from:m.seq.origin,steps,to:steps[steps.length-1].to};
      board[m.seq.origin]=0;for(const s of steps){board[s.mid]=0;board[s.to]=pl;}
      log('IA cattura '+m.seq.captured.length+' pedina/e.');pushH(lastMove,pl);chkW();if(!over)endT();
    } else if(m.type==='rot'){
      const st=(rotN%3)+1;lastMove={type:'rot',ring:m.ring,steps:st};
      animR(m.ring,st,()=>{
        const cells=rC(m.ring),n=cells.length,sp={},spOld=Object.assign({},special);
        cells.forEach(c=>sp[c]=board[c]);for(let i=0;i<n;i++)board[cells[i]]=sp[cells[(i-st+n)%n]];
        cells.forEach(c=>{if(special[c])delete special[c];});
        cells.forEach((c,i)=>{if(spOld[c])special[cells[(i+st)%n]]=true;});
        rotN++;log('IA ruota '+{M:'medio',E:'esterno'}[m.ring]+'.');pushH(lastMove,pl);chkW();if(!over)endT();
      });
    }
  }

  // Apply move from Firebase (online mode)
  function applyRemote(mv){
    if(over)return;
    const pl=mv.player,isSpec=special[mv.from];
    if(mv.type==='move'){
      if(mv.steps&&mv.steps.length){
        board[mv.from]=0;
        mv.steps.forEach((s,i)=>{
          if(i>0)board[mv.steps[i-1].to]=0;
          board[s.mid]=0;board[s.to]=pl;
          if(special[s.mid])delete special[s.mid];
        });
        if(isSpec){special[mv.steps[mv.steps.length-1].to]=true;delete special[mv.from];}
      } else if(mv.mid){
        board[mv.from]=0;board[mv.mid]=0;board[mv.to]=pl;
        if(special[mv.mid])delete special[mv.mid];
        if(isSpec){special[mv.to]=true;delete special[mv.from];}
      } else {
        board[mv.to]=pl;board[mv.from]=0;
        if(isSpec){special[mv.to]=true;delete special[mv.from];}
      }
      lastMove={type:'move',from:mv.from,to:mv.to};
    } else if(mv.type==='rot'){
      const cells=rC(mv.ring),n=cells.length,sp={},spOld=Object.assign({},special);
      cells.forEach(c=>sp[c]=board[c]);for(let i=0;i<n;i++)board[cells[i]]=sp[cells[(i-mv.steps+n)%n]];
      cells.forEach(c=>{if(special[c])delete special[c];});
      cells.forEach((c,i)=>{if(spOld[c])special[cells[(i+mv.steps)%n]]=true;});
      rotN++;lastMove={type:'rot',ring:mv.ring,steps:mv.steps};
    }
    cur=mv.player===1?2:1;
    pushH(lastMove,mv.player);chkW();upd();draw();
  }

  // Rotation
  function previewRot(r){
    if(over||anim||!live()||!isHuman())return;
    if(!hP(cur,r))return;
    prvRing=r;const st=(rotN%3)+1;
    document.getElementById('rot-hint').textContent='Anello '+{M:'medio',E:'esterno'}[r]+': +'+st+' casella'+(st>1?'e':'')+' →';
    document.getElementById('btn-'+r).classList.add('previewing');draw();
  }
  function clearPreview(){prvRing=null;document.getElementById('rot-hint').textContent='';['M','E'].forEach(r=>{const b=document.getElementById('btn-'+r);if(b)b.classList.remove('previewing');});draw();}

  function rot(r){
    if(over||must||anim||!live()||!isHuman())return;
    if(!hP(cur,r)){log("Nessuna pedina sull'anello "+{M:'medio',E:'esterno'}[r]+'.');return;}
    clearPreview();
    const st=(rotN%3)+1,pl=cur;
    const cells=rC(r),n=cells.length,sp={},spOld=Object.assign({},special);
    cells.forEach(c=>sp[c]=board[c]);for(let i=0;i<n;i++)board[cells[i]]=sp[cells[(i-st+n)%n]];
    cells.forEach(c=>{if(special[c])delete special[c];});
    cells.forEach((c,i)=>{if(spOld[c])special[cells[(i+st)%n]]=true;});
    rotN++;lastMove={type:'rot',ring:r,steps:st};
    log('Anello '+{M:'medio',E:'esterno'}[r]+' ruotato di '+st+' passo/i.');
    if(gameMode==='online')window.sendMove({type:'rot',ring:r,steps:st,player:pl});
    pushH(lastMove,pl);chkW();if(!over)endT();
  }

  // Rotation animation (for AI only)
  function animR(ring,steps,cb){
    anim=true;const rr=ring==='E'?RE:RM,sd=ring==='E'?20:30,td=steps*sd;
    const cells=rC(ring),pieces=cells.filter(c=>board[c]!==0).map(c=>({pl:board[c],a0:aD(c)}));
    const dur=420,t0=performance.now();
    function fr(now){
      const t=Math.min((now-t0)/dur,1),e=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2,rot_=td*e;
      dBase(ring);
      pieces.forEach(p=>{const a=(p.a0-rot_)*Math.PI/180,x=CX+rr*Math.cos(a),y=CY+rr*Math.sin(a);ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fillStyle=p.pl===1?'#c04828':'#1d6fa5';ctx.fill();});
      if(t<1)requestAnimationFrame(fr);else{anim=false;cb();}
    }
    requestAnimationFrame(fr);
  }

  // Click helpers
  function mvSp(from,to){special[to]=true;delete special[from];board[to]=cur;board[from]=0;}
  function capSp(from,mid,to){special[to]=true;delete special[from];board[from]=0;board[mid]=0;board[to]=cur;if(special[mid])delete special[mid];}

  function finishMove(lm){
    pushH(lm,cur);
    if(gameMode==='online')window.sendMove({...lm,player:cur});
    chkW();if(!over)endT();
  }
  function startCap(from,mid,to,isSpec){pendingCap={from,steps:[{mid,to}],isSpecial:isSpec};}
  function addCap(mid,to){if(pendingCap)pendingCap.steps.push({mid,to});}
  function commitCap(){
    if(!pendingCap)return;
    const pc=pendingCap;pendingCap=null;
    const finalTo=pc.steps[pc.steps.length-1].to;
    finishMove({type:'move',from:pc.from,steps:pc.steps,to:finalTo});
  }

  cv.addEventListener('click',e=>{
    if(anim||!live())return;
    if(prvRing){clearPreview();return;}
    const rect=cv.getBoundingClientRect(),sx=W/rect.width,sy=H/rect.height;
    const mx=(e.clientX-rect.left)*sx,my=(e.clientY-rect.top)*sy;
    for(const id of ALL){const[x,y]=pos(id);if((mx-x)**2+(my-y)**2<=225){clickC(id);return;}}
  });

  function clickC(id){
    if(over||anim||!live()||!isHuman())return;

    if(must){
      if(board[id]===0){
        const j=cF(board,must,cur).find(j=>j.to===id);
        if(j){
          const from=must;
          board[must]=0;board[j.mid]=0;board[j.to]=cur;
          if(special[j.mid])delete special[j.mid];
          if(pendingCap&&pendingCap.isSpecial){special[j.to]=true;}
          addCap(j.mid,j.to);
          chkW();if(over){commitCap();return;}
          const more=cF(board,j.to,cur);
          if(more.length){must=j.to;sel=j.to;log('→'+j.to+'. Continua!');upd();draw();return;}
          must=null;sel=null;log('Cattura →'+j.to+'.');commitCap();return;
        }
      }
      sel=must;draw();return;
    }

    if(sel===null){if(board[id]===cur){sel=id;draw();}return;}
    if(id===sel){sel=null;draw();return;}
    if(board[id]===cur){sel=id;draw();return;}

    const normCap=hasNormalCap(cur),specCap=hasSpecialCap(cur),anyCap=normCap||specCap,isSpecial=special[sel];

    // Normal capture
    const j=cF(board,sel,cur).find(j=>j.to===id);
    if(j){
      const from=sel;
      board[sel]=0;board[j.mid]=0;board[j.to]=cur;
      if(special[j.mid])delete special[j.mid];
      if(isSpecial){special[j.to]=true;delete special[from];}
      startCap(from,j.mid,j.to,isSpecial);
      chkW();if(over){commitCap();return;}
      if(!isSpecial){const more=cF(board,j.to,cur);if(more.length){must=j.to;sel=j.to;log('Cattura →'+j.to+'. Continua!');upd();draw();return;}}
      must=null;sel=null;log('Cattura: '+from+'→'+id+'.');commitCap();return;
    }

    // Special horizontal capture
    if(isSpecial){
      const sc=spMoves(board,sel,cur),cap=sc.caps.find(c=>c.to===id);
      if(cap){
        const from=sel;capSp(from,cap.mid,cap.to);
        startCap(from,cap.mid,cap.to,true);
        chkW();if(over){commitCap();return;}
        must=null;sel=null;log('Cattura speciale: '+from+'→'+id+'.');commitCap();return;
      }
    }

    // Normal move
    if((ADJ[sel]||[]).includes(id)&&board[id]===0){
      if(anyCap){log('Cattura obbligatoria!');return;}
      if(isSpecial){mvSp(sel,id);}else{board[id]=cur;board[sel]=0;}
      const lm={type:'move',from:sel,to:id};log('Mossa: '+sel+'→'+id+'.');sel=null;finishMove(lm);return;
    }

    // Special horizontal move
    if(isSpecial&&board[id]===0&&rowOf(id)===rowOf(sel)&&rowOf(sel)!==-1){
      if(anyCap){log('Cattura obbligatoria!');return;}
      const sc=spMoves(board,sel,cur);
      if(sc.moves.includes(id)){
        mvSp(sel,id);const lm={type:'move',from:sel,to:id};log('Mossa speciale: '+sel+'→'+id+'.');sel=null;finishMove(lm);return;
      }
    }
    log('Mossa non valida.');
  }

  function chkW(){
    if(WIN.every(c=>board[c]===cur)){wG(cur,'Tre nodi (I1,I3,I5) occupati!');return;}
    const en=cur===1?2:1;if(ALL.every(c=>board[c]!==en))wG(cur,'Tutte le pedine avversarie catturate!');
  }
  function wG(p,r){
    over=true;draw();upd();
    let tag='';
    if(gameMode==='online')tag=p===myPl?' (tu)':' (avversario)';
    else if(gameMode==='ai1'||gameMode==='ai2')tag=((gameMode==='ai1'&&p===1)||(gameMode==='ai2'&&p===2))?' (tu)':' (IA)';
    document.getElementById('wt').textContent='Vince P'+p+tag+'!';
    document.getElementById('wr').textContent=r;
    document.getElementById('wo').style.display='flex';
  }
  function endT(){
    must=null;cur=cur===1?2:1;mode='move';sel=null;upd();draw();
    if((gameMode==='ai1'&&cur===2)||(gameMode==='ai2'&&cur===1))setTimeout(aiTurn,500);
  }
  function log(m){document.getElementById('lg').textContent=m;}
  function upd(){
    const aiTurn_=(gameMode==='ai1'&&cur===2)||(gameMode==='ai2'&&cur===1);
    const waitOpp=gameMode==='online'&&cur!==myPl;
    document.getElementById('tl').textContent='Turno: P'+cur+(cur===1?' (rosso)':' (blu)')+(aiTurn_?' [IA]':waitOpp?' [avversario]':'');
    document.getElementById('al').textContent=
      !live()?'Navigazione — ⏭ per tornare al live':
      aiTurn_?'IA sta pensando...':
      waitOpp?'In attesa della mossa avversaria…':
      must?'Cattura da '+must+' — clicca arrivo':
      'Seleziona pedina o ruota anello.';
    document.getElementById('c1').textContent=cnt(board,1);
    document.getElementById('c2').textContent=cnt(board,2);
    const s=(rotN%3)+1;
    document.getElementById('rb').textContent='Prossima rot.: '+s+' passo'+(s>1?'i':'');
    ['M','E'].forEach(r=>{
      const btn=document.getElementById('btn-'+r);if(!btn)return;
      const ok=live()&&!over&&!anim&&hP(cur,r)&&isHuman();
      btn.classList.toggle('off',!ok);
    });
  }

  // Drawing
  function dArrow(){
    if(!lastMove)return;
    if(lastMove.type==='move'){
      const[fx,fy]=pos(lastMove.from),[tx,ty]=pos(lastMove.to),ang=Math.atan2(ty-fy,tx-fx);
      ctx.save();ctx.strokeStyle='rgba(240,180,0,0.8)';ctx.lineWidth=2.5;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(tx,ty);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='rgba(240,180,0,0.9)';ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(tx-11*Math.cos(ang-0.38),ty-11*Math.sin(ang-0.38));ctx.lineTo(tx-11*Math.cos(ang+0.38),ty-11*Math.sin(ang+0.38));ctx.closePath();ctx.fill();
      ctx.strokeStyle='rgba(240,180,0,0.55)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(tx,ty,16,0,Math.PI*2);ctx.stroke();ctx.restore();
    } else if(lastMove.type==='rot'){
      const rr=(lastMove.ring==='E'?RE:RM)+22;
      ctx.save();ctx.strokeStyle='rgba(240,180,0,0.7)';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(CX,CY,rr,Math.PI*0.55,Math.PI*1.45,false);ctx.stroke();
      const ea=Math.PI*1.45,ax=CX+rr*Math.cos(ea),ay=CY+rr*Math.sin(ea);
      ctx.fillStyle='rgba(240,180,0,0.9)';ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax-11*Math.cos(ea-1.1),ay-11*Math.sin(ea-1.1));ctx.lineTo(ax-11*Math.cos(ea-0.3),ay-11*Math.sin(ea-0.3));ctx.closePath();ctx.fill();ctx.restore();
    }
  }
  function dBase(ex){ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);dSt();for(const id of ALL){if(id!=='C'&&id[0]===ex)continue;dCell(id,false,false,false,0);}}
  function dSt(){
    RY.forEach(ry=>{ctx.strokeStyle='#e0e0e0';ctx.lineWidth=0.5;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(CX-RE-22,ry);ctx.lineTo(CX+RE+22,ry);ctx.stroke();});ctx.setLineDash([]);
    [RE,RM,RI].forEach(r=>{ctx.strokeStyle='#ccc';ctx.lineWidth=0.5;ctx.beginPath();ctx.arc(CX,CY,r,0,Math.PI*2);ctx.stroke();});
    const dr=new Set();
    for(const a of ALL)for(const b of(ADJ[a]||[])){const k=[a,b].sort().join(',');if(dr.has(k))continue;dr.add(k);const[ax,ay]=pos(a),[bx,by]=pos(b);ctx.strokeStyle='#bbb';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();}
  }
  function dCell(id,isSel,isMust,isTgt,ghostPl){
    const[x,y]=pos(id),pc=board[id],isWin=WIN.includes(id),r=rOf(id);
    let bg=r==='E'?'#eaf3de':r==='C'?'#eeedfe':'#f0f0f8';if(isWin)bg='#c0dd97';
    ctx.beginPath();ctx.arc(x,y,15,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();
    let st='#ccc',lw=0.5;
    if(isSel){st='#c04828';lw=2;}if(isMust){st='#e85d24';lw=2.5;}if(isTgt&&!ghostPl){st='#1d9e75';lw=1.5;}if(ghostPl){st='#f0a500';lw=2;}
    ctx.strokeStyle=st;ctx.lineWidth=lw;ctx.beginPath();ctx.arc(x,y,15,0,Math.PI*2);ctx.stroke();
    if(isTgt&&!ghostPl&&pc===0){ctx.fillStyle='rgba(29,158,117,0.7)';ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill();}
    if(ghostPl){ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fillStyle=ghostPl===1?'rgba(192,72,40,0.35)':'rgba(29,111,165,0.35)';ctx.fill();ctx.fillStyle='#f0a500';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('→',x,y+1);return;}
    if(pc){ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fillStyle=pc===1?'#c04828':'#1d6fa5';ctx.fill();}
    ctx.fillStyle=pc?'rgba(255,255,255,0.85)':'rgba(150,150,150,0.5)';ctx.font='7px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(id,x,y+1);
    if(special[id]&&pc){ctx.fillStyle='rgba(255,220,0,0.95)';ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('★',x,y-5);}
  }
  function draw(){
    ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);dSt();dArrow();
    let ghostM={};
    if(prvRing&&live()){const st=(rotN%3)+1,cells=rC(prvRing),n=cells.length;cells.forEach((c,i)=>{if(board[c]!==0)ghostM[cells[(i+st)%n]]=board[c];});}
    for(const id of ALL){
      const isSel=live()&&sel===id,isMust=live()&&must===id;let isTgt=false;
      if(live()&&isHuman()&&mode==='move'){
        const act=must||sel;
        if(act){
          const anyCap=ALL.some(c=>board[c]===cur&&(cF(board,c,cur).length>0||(special[c]&&spMoves(board,c,cur).caps.length>0)));
          if(!must&&!anyCap&&(ADJ[act]||[]).includes(id)&&board[id]===0)isTgt=true;
          if(!must&&!anyCap&&special[act]){const sc=spMoves(board,act,cur);if(sc.moves.includes(id))isTgt=true;}
          cF(board,act,cur).forEach(j=>{if(j.to===id)isTgt=true;});
          if(special[act]){spMoves(board,act,cur).caps.forEach(c=>{if(c.to===id)isTgt=true;});}
        }
      }
      dCell(id,isSel,isMust,isTgt,ghostM[id]||0);
    }
    ctx.beginPath();ctx.arc(16,14,7,0,Math.PI*2);ctx.fillStyle='#c04828';ctx.fill();
    ctx.fillStyle='#555';ctx.font='11px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText('P1',27,14);
    ctx.beginPath();ctx.arc(58,14,7,0,Math.PI*2);ctx.fillStyle='#1d6fa5';ctx.fill();ctx.fillText('P2',69,14);
    ctx.beginPath();ctx.arc(100,14,7,0,Math.PI*2);ctx.fillStyle='#c0dd97';ctx.fill();ctx.strokeStyle='#aaa';ctx.lineWidth=0.5;ctx.beginPath();ctx.arc(100,14,7,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#555';ctx.fillText('Vittoria: I1,I3,I5',111,14);
    ctx.fillStyle='rgba(255,220,0,0.95)';ctx.font='bold 9px sans-serif';ctx.fillText('★',305,14);
    ctx.fillStyle='#555';ctx.font='11px sans-serif';ctx.fillText('= speciale',315,14);
  }

  return{init,restart,seeBoard,rot,previewRot,clearPreview,navFirst,navPrev,navNext,navLast,copyNotation,applyRemote};
})();
</script>
</body>
</html>
